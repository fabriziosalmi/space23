<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="cockpit" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffccff"/>
      <stop offset="60%" stop-color="#ff66e0"/>
      <stop offset="100%" stop-color="#aa3399" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffeecc"/>
      <stop offset="40%" stop-color="#ffbb55"/>
      <stop offset="100%" stop-color="#ff6633" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- pure black background — full 16:9 → fills viewport with fullsize=true -->
  <rect width="1280" height="720" fill="#000000"/>

  <!-- Ship — coordinate matching Player.gd ship_renderer (NOSE, WINGS, ENGINE_L/R)
       Scaled 4x and centered at (640, 350). Origin = ship center. -->
  <g transform="translate(640 350) scale(4)">
    <!-- ENGINE FLAMES (behind body) -->
    <ellipse cx="0"   cy="42" rx="7"   ry="24" fill="url(#flame)" filter="url(#bigg)" opacity="0.9"/>
    <ellipse cx="-22" cy="40" rx="4.5" ry="18" fill="url(#flame)" filter="url(#bigg)" opacity="0.8"/>
    <ellipse cx="22"  cy="40" rx="4.5" ry="18" fill="url(#flame)" filter="url(#bigg)" opacity="0.8"/>
    <ellipse cx="0"   cy="36" rx="3"   ry="14" fill="#ffffff" opacity="0.65"/>
    <ellipse cx="-22" cy="34" rx="2"   ry="10" fill="#ffffff" opacity="0.55"/>
    <ellipse cx="22"  cy="34" rx="2"   ry="10" fill="#ffffff" opacity="0.55"/>

    <!-- WING SHADOW (left, deeper) -->
    <polygon points="-9,-8 -55,14 -28,23 -13,22" fill="#2e3852"/>
    <!-- WING LIT (right, brighter) -->
    <polygon points="9,-8 13,22 28,23 55,14" fill="#7388bf"/>

    <!-- HULL -->
    <polygon points="0,-45 7,-28 9,-8 13,22 22,25 -22,25 -13,22 -9,-8 -7,-28"
             fill="#525266"/>

    <!-- NEON TRIM (wings outline) -->
    <polyline points="-9,-8 -55,14 -28,23" stroke="#66ccff" stroke-width="1.4"
              stroke-linejoin="round" fill="none" filter="url(#g)"/>
    <polyline points="9,-8 55,14 28,23"  stroke="#66ccff" stroke-width="1.4"
              stroke-linejoin="round" fill="none" filter="url(#g)"/>

    <!-- Spine -->
    <line x1="0" y1="-45" x2="0" y2="22" stroke="#3399dd" stroke-width="1" filter="url(#g)"/>

    <!-- Hull profile (left and right) -->
    <polyline points="0,-45 7,-28 9,-8 13,22 22,25"     stroke="#3399dd" stroke-width="0.8" fill="none"/>
    <polyline points="0,-45 -7,-28 -9,-8 -13,22 -22,25" stroke="#3399dd" stroke-width="0.8" fill="none"/>

    <!-- Underline shoulder -->
    <line x1="-7" y1="-28" x2="7" y2="-28" stroke="#3399dd" stroke-width="0.8"/>

    <!-- COCKPIT (teardrop, magenta glow) -->
    <polygon points="0,-32 -4,-18 0,-8 4,-18" fill="url(#cockpit)" filter="url(#g)"/>

    <!-- NAV LIGHTS port (red) / starboard (green) -->
    <circle cx="-55" cy="14" r="2.8" fill="#ff5555" filter="url(#bigg)"/>
    <circle cx="55"  cy="14" r="2.8" fill="#66ff99" filter="url(#bigg)"/>
  </g>
</svg>
