name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Re-trigger when a GitHub release is published. Senza questo trigger,
  # creare una release dopo il push del bump-commit non ri-deployava (la
  # tag è solo un puntatore al commit già su main, che era già stato
  # deployato dal `push`-trigger). Con questo trigger, ogni release
  # garantisce un fresh deploy — utile per tagliare la cache CDN di Pages
  # o per re-publishare se la prima deploy era fallita.
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  export-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          # I binari (MP3, screenshot.png) sono in Git LFS dopo `git lfs migrate import`.
          # `lfs: true` fa sì che il checkout faccia anche il pull dei pointer.
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.4.1"
          use-dotnet: false

      - name: Download Godot Export Templates Manually
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.4.1.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_export_templates.tpz -O templates.zip
          unzip -q templates.zip
          mv templates/* ~/.local/share/godot/export_templates/4.4.1.stable/
          rm -rf templates templates.zip

      - name: Create export_presets.cfg
        # head_include below adds iOS WebKit fixes beyond Godot's default shell:
        #   - viewport meta (maximum-scale=1, user-scalable=no): prevents double-tap
        #     zoom that resizes the canvas → triggers WebGL context reload (perceived
        #     as "page refreshes after a few taps").
        #   - viewport-fit=cover: canvas extends under the iPhone notch.
        #   - touch-action: manipulation/none: kills 300ms tap-delay and default
        #     gestures (zoom, swipe scroll) Safari would otherwise hijack.
        #   - -webkit-touch-callout: none: kills long-press selection menu.
        #   - position: fixed on body: kills iOS rubber-band scroll under the canvas.
        run: |
          cat <<'CFGEOF' > export_presets.cfg
          [preset.0]
          name="Web"
          platform="Web"
          runnable=true
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/web/index.html"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]
          custom_template/debug=""
          custom_template/release=""
          variant/export_type=0
          vram_texture_compression/for_desktop=true
          vram_texture_compression/for_mobile=false
          html/custom_html_shell=""
          html/head_include="<meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover'><script src='audio-fix.js'></script><style>html,body{margin:0;padding:0;overflow:hidden;width:100%;height:100%;position:fixed;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:manipulation;background:#000;}canvas{touch-action:none;-webkit-user-select:none;user-select:none;display:block;}@media screen and (orientation: portrait) and (max-width: 1024px){#canvas,#status{display:none !important;}body::before{content:'Please rotate your device to landscape';position:fixed;inset:0;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:sans-serif;font-size:1.2rem;text-align:center;padding:2rem;}}</style>"
          html/canvas_resize_policy=2
          html/focus_canvas_on_start=true
          html/experimental_virtual_keyboard=false
          progressive_web_app/enabled=false
          CFGEOF

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Inject audio-fix.js next to index.html
        # Referenced from html/head_include above. Must sit alongside index.html
        # in the deployed artifact root.
        run: cp audio-fix.js build/web/audio-fix.js

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: export-web
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
