    <rect y="186" width="1200" height="2"/>
    <rect y="192" width="1200" height="2"/>
    <rect y="198" width="1200" height="2"/>
    <rect y="204" width="1200" height="2"/>
    <rect y="210" width="1200" height="2"/>
    <rect y="216" width="1200" height="2"/>
    <rect y="222" width="1200" height="2"/>
    <rect y="228" width="1200" height="2"/>
    <rect y="234" width="1200" height="2"/>
    <rect y="240" width="1200" height="2"/>
    <rect y="246" width="1200" height="2"/>
    <rect y="252" width="1200" height="2"/>
    <rect y="258" width="1200" height="2"/>
    <rect y="264" width="1200" height="2"/>
    <rect y="270" width="1200" height="2"/>
