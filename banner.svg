    <rect y="300" width="1200" height="2"/>
    <rect y="306" width="1200" height="2"/>
    <rect y="312" width="1200" height="2"/>
  </g>

  <!-- VIGNETTE -->
  <radialGradient id="vig" cx="50%" cy="50%" r="65%">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="1200" height="320" fill="url(#vig)"/>

  <!-- BORDER -->
  <rect x="2" y="2" width="1196" height="316" fill="none" stroke="#222222" stroke-width="2"/>
</svg>
